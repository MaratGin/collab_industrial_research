# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - /ur5e/ur5e_joint_trajectory_controller
    - /ur5e/onrobot_gripper_controller
    - /kuka/kuka_arm_controller
    - /kuka/kuka_gripper_controller


  /ur5e/ur5e_joint_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - ur5e_shoulder_pan_joint
      - ur5e_shoulder_lift_joint
      - ur5e_elbow_joint
      - ur5e_wrist_1_joint
      - ur5e_wrist_2_joint
      - ur5e_wrist_3_joint

  /ur5e/onrobot_gripper_controller:
    type: GripperCommand
    action_ns: gripper_cmd
    default: true
    joints:
      - ur5e_onrobot_gripper_joint
    parallel: false
    max_effort: 50.0


  /kuka/kuka_arm_controller:
    type: FollowJointTrajectory
    joints:
      - kuka_joint_a1
      - kuka_joint_a2
      - kuka_joint_a3
      - kuka_joint_a4
      - kuka_joint_a5
      - kuka_joint_a6
    action_ns: follow_joint_trajectory    
    default: true

  /kuka/kuka_gripper_controller:
    type: FollowJointTrajectory
    joints:
      - kuka_egp64_finger_left_joint
      - kuka_egp64_finger_right_joint
    action_ns: follow_joint_trajectory
    default: true